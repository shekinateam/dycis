<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LifeSmart 시연</title>
<style>
:root{
  --text:#eef4ff; --muted:#a7b6d6; --line:rgba(255,255,255,.13);
  --panel:rgba(255,255,255,.055); --panel2:rgba(255,255,255,.035);
  --on:#6ee7b7; --on-bg:rgba(28,176,118,.22); --off:#fb7185; --off-bg:rgba(251,113,133,.18);
  --room-glow:rgba(230,238,255,.18); --wall-light:rgba(230,238,255,.10); --floor-light:rgba(230,238,255,.08); --ceiling-light:rgba(230,238,255,.14);
  --screen-color:rgba(90,150,255,.42); --ambient:1; --ac-unit-opacity:1; --ac-flow:#8ee8ff; --blind-opacity:.78; --room-filter:saturate(1) brightness(1);
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 16% 0%,rgba(88,220,255,.12),transparent 26%),linear-gradient(180deg,#08101f,#07101d 60%,#050913);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard","Noto Sans KR",sans-serif;min-height:100vh}
.wrap{width:min(1480px,calc(100% - 18px));margin:0 auto;padding:8px 0 12px}
.layout{display:grid;grid-template-columns:250px minmax(780px,1fr) 270px;gap:12px;align-items:start}
.panel{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel2));border-radius:24px;box-shadow:0 26px 80px rgba(0,0,0,.36)}
.side,.right{padding:14px}.center{padding:10px}
h2{font-size:17px;margin:0 0 10px}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
button{font-family:inherit}
.seg button,.scene-btn{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--text);border-radius:15px;cursor:pointer;transition:.18s}
.seg button{padding:12px 8px;font-size:14px;font-weight:800}
.seg button.active,.scene-btn.active{border-color:rgba(110,231,183,.55);background:linear-gradient(135deg,rgba(110,231,183,.18),rgba(88,220,255,.06))}
.scene-list{display:grid;gap:8px}
.scene-btn{padding:12px;text-align:left}
.scene-btn b{display:block;font-size:15px}
.scene-btn span{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.scene-btn.hidden{display:none}
.kv{display:grid;gap:8px;margin-top:12px}
.kv .row{display:flex;justify-content:space-between;gap:10px;padding:9px 10px;border:1px solid rgba(255,255,255,.07);border-radius:13px;background:rgba(255,255,255,.035)}
.k{font-size:12px;color:var(--muted)}
.v{font-size:13px;font-weight:800;text-align:right}
.v.on{color:var(--on)}
.v.off{color:var(--off)}
.viewer{padding:6px;min-height:650px}
.legend{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
.chip{border:1px solid var(--line);background:rgba(255,255,255,.05);padding:8px 12px;border-radius:999px;font-size:13px;font-weight:700}
#roomSvg{display:block;width:100%;height:auto;filter:var(--room-filter);transition:filter .5s ease}
.summary{display:grid;gap:8px;margin-top:10px}
.status{padding:12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.status .label{font-size:12px;color:var(--muted);margin-bottom:6px}
.status .value{font-size:18px;font-weight:900}
.status .sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.45}
.devices{display:grid;gap:8px;margin-top:10px}
.device{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.035);transition:.25s}
.device.off{opacity:.48;filter:grayscale(.9)}
.device .left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700}
.ico{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:rgba(104,168,255,.15);border:1px solid rgba(104,168,255,.22)}
.state{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:900}
.dot{width:9px;height:9px;border-radius:50%;background:#7f8ba3}
.dot.on{background:var(--on);box-shadow:0 0 14px rgba(110,231,183,.6)}
.state.on{color:var(--on)}
.state.off{color:var(--off)}

/* SVG */
#ambientGlow,#ambientWalls,#ambientFloor,#ambientCeiling,#videoScreen,#screenCast,#blindLeft,#blindRight,#acUnitGroup,#pcGroup,#audioGroup,#pcBadge,#audioBadge,#screenBadge,#acPowerBadge,#blindBadge,#liftGroup,#liftBadge,#liftMonitorGroup,#liftStem,#screenLabel,#blindLabel,#acLabel,#liftLabel,.svg-label,.svg-status{transition:all .55s ease}
#acFlowGroup{transition:opacity .35s ease}
.ac-flow-line{animation:breeze 1.25s linear infinite}
@keyframes breeze{0%{transform:translateX(0);opacity:.15}45%{opacity:.85}100%{transform:translateX(-18px);opacity:.06}}
.audio-wave{animation:wave 1.2s ease-in-out infinite;transform-origin:660px 500px}
.audio-wave.off{animation:none;opacity:.14}
@keyframes wave{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.18);opacity:.95}}
.pc-screen-on{filter:drop-shadow(0 0 14px rgba(110,231,183,.5))}
.svg-status.on rect{fill:rgba(28,176,118,.90)}
.svg-status.off rect{fill:rgba(98,40,50,.92)}
.svg-status text{fill:#fff;font-weight:900}
.svg-label rect{fill:rgba(9,16,31,.78);stroke:rgba(255,255,255,.14)}
.svg-label text{fill:#eaf3ff;font-weight:900;font-size:14px}

@media(max-width:1260px){.layout{grid-template-columns:220px 1fr}.right{grid-column:1/-1}}
@media(max-width:860px){.layout{grid-template-columns:1fr}.viewer{min-height:auto}}
</style>
</head>
<body>
<div class="wrap"><div class="layout">
  <aside class="panel side">
    <h2>구성</h2>
    <div class="seg">
      <button class="pkg-btn active" data-package="basic">실속형</button>

  <section class="panel center"><div class="viewer">

        <linearGradient id="sideWallGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#394c70"/><stop offset="100%" stop-color="#17243b"/></linearGradient>

        <rect x="785" y="255" width="64" height="160" rx="4" fill="#a2c9df" opacity=".38"/>
        <g id="blindLeft" transform-origin="785px 255px"><rect x="786" y="255" width="30" height="160" fill="#cbd5e1" opacity="var(--blind-opacity)"/><g fill="#b6c4d4" opacity=".9"><rect x="786" y="258" width="30" height="8"/><rect x="786" y="280" width="30" height="8"/><rect x="786" y="302" width="30" height="8"/><rect x="786" y="324" width="30" height="8"/><rect x="786" y="346" width="30" height="8"/><rect x="786" y="368" width="30" height="8"/><rect x="786" y="390" width="30" height="8"/></g></g>
        <g id="blindRight" transform-origin="849px 255px"><rect x="819" y="255" width="30" height="160" fill="#cbd5e1" opacity="var(--blind-opacity)"/><g fill="#b6c4d4" opacity=".9"><rect x="819" y="258" width="30" height="8"/><rect x="819" y="280" width="30" height="8"/><rect x="819" y="302" width="30" height="8"/><rect x="819" y="324" width="30" height="8"/><rect x="819" y="346" width="30" height="8"/><rect x="819" y="368" width="30" height="8"/><rect x="819" y="390" width="30" height="8"/></g></g>

  <aside class="panel right">
    <h2>상태</h2>
    <div class="summary">
      <div class="status">
        <div class="label">현재</div>
        <div class="value" id="statusTitle">실속형 · 평소모드</div>
        <div class="sub" id="statusSub">비디오 월 OFF · 음향장비 OFF · 모니터 리프트 내림</div>
      </div>
    </div>
    <div class="devices">
      <div class="device" id="devAc"><div class="left"><div class="ico">❄️</div><div>에어컨</div></div><div class="state" id="stateAc"><span class="dot" id="dotAc"></span><span id="txtAc">ON</span></div></div>
      <div class="device" id="devBlind"><div class="left"><div class="ico">🪟</div><div>블라인드</div></div><div class="state" id="stateBlind"><span class="dot" id="dotBlind"></span><span id="txtBlind">올림</span></div></div>
      <div class="device" id="devScreen"><div class="left"><div class="ico">🖥️</div><div>비디오 월</div></div><div class="state" id="stateScreen"><span class="dot" id="dotScreen"></span><span id="txtScreen">OFF</span></div></div>
      <div class="device" id="devLift"><div class="left"><div class="ico">⬆️</div><div>모니터 리프트</div></div><div class="state" id="stateLift"><span class="dot" id="dotLift"></span><span id="txtLift">내림</span></div></div>
      <div class="device" id="devPc"><div class="left"><div class="ico">💻</div><div>PC</div></div><div class="state" id="statePc"><span class="dot" id="dotPc"></span><span id="txtPc">OFF</span></div></div>
      <div class="device" id="devAudio"><div class="left"><div class="ico">🔊</div><div>음향장비</div></div><div class="state" id="stateAudio"><span class="dot" id="dotAudio"></span><span id="txtAudio">OFF</span></div></div>
    </div>
  </aside>
</div></div>
<script>

let pkg='basic',scene='normal';
const $=s=>document.querySelector(s); const $$=s=>[...document.querySelectorAll(s)];
const el={
  title:$('#sceneTitle'),status:$('#statusTitle'),sub:$('#statusSub'),
  kvPackage:$('#kvPackage'),kvLight:$('#kvLight'),kvTemp:$('#kvTemp'),kvScreen:$('#kvScreen'),kvBlind:$('#kvBlind'),kvAir:$('#kvAir'),kvLift:$('#kvLift'),
  blindLeft:$('#blindLeft'),blindRight:$('#blindRight'),video:$('#videoScreen'),logo:$('#screenLogoShape'),wave:$('#screenWave'),
  pcScreen:$('#pcScreen'),pcGroup:$('#pcGroup'),audioGroup:$('#audioGroup'),acFlowGroup:$('#acFlowGroup'),
  liftMonitorGroup:$('#liftMonitorGroup'),liftMonitor:$('#liftMonitor'),
  acBadge:$('#acPowerBadge'),screenBadge:$('#screenBadge'),blindBadge:$('#blindBadge'),liftBadge:$('#liftBadge'),pcBadge:$('#pcBadge'),audioBadge:$('#audioBadge')
};
function setRoot(s){
  const pairs={'--room-glow':s.css.roomGlow,'--ceiling-light':s.css.ceiling,'--wall-light':s.css.walls,'--floor-light':s.css.floor,'--screen-color':s.css.screenColor,'--ambient':s.css.ambient,'--ac-unit-opacity':s.css.acUnitOpacity,'--ac-flow':s.css.acFlow,'--blind-opacity':s.css.blindOpacity,'--room-filter':s.css.filter};
  Object.entries(pairs).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
}
function statusGroup(g,on,text){g.classList.toggle('on',!!on);g.classList.toggle('off',!on);g.querySelector('text').textContent=text;}
function sideDevice(key,on,text){
  $('#dev'+key).classList.toggle('off',!on);
  $('#dot'+key).classList.toggle('on',!!on);
  $('#state'+key).classList.toggle('on',!!on);
  $('#state'+key).classList.toggle('off',!on);
  $('#txt'+key).textContent=text;
}
function setKvState(node, active){node.className='v '+(active?'on':'off');}
function apply(){
  if(!scenes[pkg][scene]) scene='normal';
  const s=scenes[pkg][scene], p=pkgInfo[pkg], d=s.device;
  $$('.pkg-btn').forEach(b=>b.classList.toggle('active',b.dataset.package===pkg));
  $$('.scene-btn').forEach(b=>{b.classList.toggle('hidden',pkg==='basic'&&b.classList.contains('premium-only'));b.classList.toggle('active',b.dataset.scene===scene)});
  setRoot(s);

  el.title.textContent=`${p.label} · ${s.title}`;
  el.status.textContent=`${p.label} · ${s.title}`;
  el.sub.textContent=s.sub;
  el.kvPackage.textContent=p.label; el.kvLight.textContent=s.light; el.kvTemp.textContent=s.temp; el.kvScreen.textContent=s.screen; el.kvBlind.textContent=s.blind; el.kvAir.textContent=s.air; el.kvLift.textContent=s.lift;
  setKvState(el.kvScreen,d.screen); setKvState(el.kvBlind,d.blind==='올림'); setKvState(el.kvAir,d.ac); setKvState(el.kvLift,d.lift);

  sideDevice('Ac',d.ac,d.ac?'ON':'OFF');
  sideDevice('Blind',d.blind==='올림',d.blind);
  sideDevice('Screen',d.screen,d.screen?'ON':'OFF');
  sideDevice('Lift',d.lift,d.lift?'올림':'내림');
  sideDevice('Pc',d.pc,d.pc?'ON':'OFF');
  sideDevice('Audio',d.audio,d.audio?'ON':'OFF');

  el.blindLeft.style.transform=s.blindLeft;
  el.blindRight.style.transform=s.blindRight;
  statusGroup(el.acBadge,d.ac,d.ac?'ON':'OFF');
  statusGroup(el.screenBadge,d.screen,d.screen?'ON':'OFF');
  statusGroup(el.blindBadge,d.blind==='올림',d.blind);
  statusGroup(el.liftBadge,d.lift,d.lift?'올림':'내림');
  statusGroup(el.pcBadge,d.pc,d.pc?'ON':'OFF');
  statusGroup(el.audioBadge,d.audio,d.audio?'ON':'OFF');

  el.acFlowGroup.style.display=d.ac?'block':'none';
  el.pcGroup.style.opacity=d.pc?1:.38;
  el.pcScreen.setAttribute('fill',d.pc?'#5b8cff':'#2a2e38');
  el.audioGroup.style.opacity=d.audio?1:.38;
  $$('.audio-wave').forEach(w=>w.classList.toggle('off',!d.audio));

  el.liftMonitorGroup.setAttribute('transform', `translate(0,${s.liftY})`);
  el.liftMonitor.setAttribute('fill', d.lift ? '#5b8cff' : '#3a4252');

  if(s.screenMode==='welcome'){
    el.video.setAttribute('fill', pkg==='premium' ? '#476da8' : '#38577f');
    el.video.setAttribute('opacity','.98'); el.logo.setAttribute('opacity','1'); el.wave.setAttribute('opacity','0');
  }else if(s.screenMode==='off'){
    el.video.setAttribute('fill','#2a2e38');
    el.video.setAttribute('opacity','.6'); el.logo.setAttribute('opacity','0'); el.wave.setAttribute('opacity','0');
  }else{
    el.video.setAttribute('fill', pkg==='premium' ? '#284b67' : '#344a60');
    el.video.setAttribute('opacity','.98'); el.logo.setAttribute('opacity','0.35'); el.wave.setAttribute('opacity','1');
  }
}
$$('.pkg-btn').forEach(b=>b.onclick=()=>{pkg=b.dataset.package; if(!scenes[pkg][scene]) scene='normal'; apply();});
$$('.scene-btn').forEach(b=>b.onclick=()=>{scene=b.dataset.scene; apply();});
apply();
</script>
