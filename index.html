<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LifeSmart 씬 모드</title>
  <style>
    :root{
      --text:#eef4ff; --muted:#a7b6d6; --line:rgba(255,255,255,.12);
      --panel:rgba(255,255,255,.05); --panel2:rgba(255,255,255,.04);
      --device-on:#6ee7b7; --device-off:#7f8ba3;
      --room-glow: rgba(230,238,255,.18);
      --wall-light: rgba(230,238,255,.10);
      --floor-light: rgba(230,238,255,.08);
      --ceiling-light: rgba(230,238,255,.14);
      --screen-color: rgba(90,150,255,.40);
      --blind-opacity: .78;
      --ac-opacity: 1;
      --ac-unit-opacity: 1;
      --ac-flow: #8ee8ff;
      --ambient-opacity: 1;
      --person-opacity: 0;
      --sensor-ring-opacity: 0;
      --room-saturation: 1;
      --badge-off: rgba(65,24,35,.84);
      --badge-on: rgba(9,16,31,.72);
      --badge-ac: rgba(9,16,31,.72);
      --badge-screen: rgba(9,16,31,.72);
      --badge-blind: rgba(9,16,31,.72);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:radial-gradient(circle at top left, rgba(88,220,255,.12), transparent 24%), radial-gradient(circle at top right, rgba(190,132,252,.10), transparent 20%), linear-gradient(180deg,#07101c,#091223 40%, #060b16 100%); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard","Noto Sans KR",sans-serif;}
    body{min-height:100vh}
    .wrap{width:min(1380px, calc(100% - 18px)); margin:0 auto; padding:10px 0 14px}
    .layout{display:grid; grid-template-columns:240px minmax(760px,1fr) 250px; gap:12px; align-items:start}
    .panel{background:linear-gradient(180deg, var(--panel), var(--panel2)); border:1px solid var(--line); border-radius:26px; box-shadow:0 28px 90px rgba(0,0,0,.38)}
    .side,.right{padding:14px}
    .center{padding:10px}
    h2{font-size:17px; margin:0 0 10px; letter-spacing:-.02em}
    .seg{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px}
    .seg button,.scene-btn{appearance:none; border:1px solid var(--line); background:rgba(255,255,255,.045); color:var(--text); border-radius:16px; cursor:pointer; transition:.18s; }
    .seg button{padding:12px 8px; font-size:14px; font-weight:700}
    .seg button.active,.scene-btn.active{border-color:rgba(104,168,255,.55); background:linear-gradient(135deg, rgba(104,168,255,.18), rgba(88,220,255,.08));}
    .scene-list{display:grid; gap:8px}
    .scene-btn{padding:12px 12px; text-align:left}
    .scene-btn b{display:block; font-size:15px; margin-bottom:2px}
    .scene-btn span{display:block; font-size:12px; color:var(--muted)}
    .scene-btn.hidden{display:none}
    .kv{display:grid; gap:8px; margin-top:12px}
    .row{display:flex; justify-content:space-between; gap:10px; align-items:center; padding:9px 10px; border-radius:13px; background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.06)}
    .k{font-size:12px; color:var(--muted)} .v{font-size:13px; font-weight:700}
    .viewer{padding:6px; min-height:650px}
    .legend{display:flex; justify-content:space-between; gap:8px; align-items:center; margin-bottom:4px}
    .chip{display:inline-flex; align-items:center; padding:8px 12px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.05); font-size:13px}
    #roomSvg{display:block; width:100%; height:auto; filter:saturate(var(--room-saturation))}
    .devices{display:grid; gap:8px; margin-top:10px}
    .device{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px 11px; border-radius:14px; border:1px solid rgba(255,255,255,.07); background:rgba(255,255,255,.035)}
    .device .left{display:flex; align-items:center; gap:8px; font-size:14px}
    .ico{width:30px; height:30px; border-radius:11px; display:grid; place-items:center; background:rgba(104,168,255,.13); border:1px solid rgba(104,168,255,.22); font-size:16px}
    .state{display:inline-flex; align-items:center; gap:8px; font-size:12px}
    .dot{width:9px; height:9px; border-radius:50%; background:var(--device-off)} .dot.on{background:var(--device-on); box-shadow:0 0 14px rgba(110,231,183,.55)}
    .summary{display:grid; gap:8px; margin-top:10px}
    .status{padding:12px; border-radius:16px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07)}
    .status .label{font-size:12px; color:var(--muted); margin-bottom:6px}
    .status .value{font-size:18px; font-weight:800; letter-spacing:-.02em}
    .status .sub{font-size:12px; color:var(--muted); margin-top:4px}

    #ambientGlow,#ambientWalls,#ambientFloor,#ambientCeiling,#videoScreen,#screenCast,#blindLeft,#blindRight,#personGroup,#sensorRing,#acFlowGroup,.light-fixture,.wallAccent,#screenLogoShape,#screenWave,#sensorBadge,#acPowerBadge,#screenBadge,#blindBadge,#acUnitGroup{transition:all .65s ease}
    .ceiling-light-bar,.floor-pool,.wall-pool,.blind-slat{transition:all .7s ease}
    .ac-flow-line{animation:breeze 1.4s linear infinite; opacity:var(--ac-opacity)}
    @keyframes breeze{0%{transform:translateX(0); opacity:.2}40%{opacity:.7}100%{transform:translateX(-16px); opacity:.1}}
    @media (max-width:1260px){.layout{grid-template-columns:220px 1fr}.right{grid-column:1/-1}}
    @media (max-width:860px){.layout{grid-template-columns:1fr}.viewer{min-height:auto}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="layout">
    <aside class="panel side">
      <h2>구성</h2>
      <div class="seg">
        <button class="pkg-btn active" data-package="basic">실속형</button>
        <button class="pkg-btn" data-package="premium">프리미엄</button>
      </div>
      <h2>모드</h2>
      <div class="scene-list">
        <button class="scene-btn active" data-scene="welcome"><b>영접모드</b><span>조명 · 화면 · 블라인드 · 에어컨</span></button>
        <button class="scene-btn" data-scene="meeting"><b>회의모드</b><span>회의 준비 상태</span></button>
        <button class="scene-btn premium-only" data-scene="presentation"><b>발표모드</b><span>화면 집중</span></button>
        <button class="scene-btn premium-only" data-scene="focus"><b>집중모드</b><span>밝은 조명</span></button>
        <button class="scene-btn premium-only" data-scene="rest"><b>휴식모드</b><span>낮은 밝기</span></button>
        <button class="scene-btn" data-scene="off"><b>전체 OFF</b><span>전체 차단</span></button>
      </div>
      <div class="kv">
        <div class="row"><div class="k">구성</div><div class="v" id="kvPackage">실속형</div></div>
        <div class="row"><div class="k">조명</div><div class="v" id="kvLight">ON/OFF</div></div>
        <div class="row"><div class="k">색온도</div><div class="v" id="kvTemp">-</div></div>
        <div class="row"><div class="k">비디오 월</div><div class="v" id="kvScreen">로고</div></div>
        <div class="row"><div class="k">블라인드</div><div class="v" id="kvBlind">열림</div></div>
        <div class="row"><div class="k">에어컨</div><div class="v" id="kvAir">23°C / ON</div></div>
      </div>
    </aside>

    <section class="panel center">
      <div class="viewer">
        <div class="legend">

          </g>
          <g id="windowGroup" filter="url(#shadow)">

            <g id="blindLeft" transform-origin="785px 255px"><rect x="786" y="255" width="30" height="160" fill="#cbd5e1" opacity="var(--blind-opacity)"/><g fill="#b6c4d4" opacity=".9"><rect class="blind-slat" x="786" y="258" width="30" height="8"/><rect class="blind-slat" x="786" y="280" width="30" height="8"/><rect class="blind-slat" x="786" y="302" width="30" height="8"/><rect class="blind-slat" x="786" y="324" width="30" height="8"/><rect class="blind-slat" x="786" y="346" width="30" height="8"/><rect class="blind-slat" x="786" y="368" width="30" height="8"/><rect class="blind-slat" x="786" y="390" width="30" height="8"/></g></g>
            <g id="blindRight" transform-origin="849px 255px"><rect x="819" y="255" width="30" height="160" fill="#cbd5e1" opacity="var(--blind-opacity)"/><g fill="#b6c4d4" opacity=".9"><rect class="blind-slat" x="819" y="258" width="30" height="8"/><rect class="blind-slat" x="819" y="280" width="30" height="8"/><rect class="blind-slat" x="819" y="302" width="30" height="8"/><rect class="blind-slat" x="819" y="324" width="30" height="8"/><rect class="blind-slat" x="819" y="346" width="30" height="8"/><rect class="blind-slat" x="819" y="368" width="30" height="8"/><rect class="blind-slat" x="819" y="390" width="30" height="8"/></g></g>

    </section>

    <aside class="panel right">
      <h2>상태</h2>
      <div class="summary">
        <div class="status"><div class="label">현재</div><div class="value" id="statusTitle">실속형 · 영접모드</div><div class="sub" id="statusSub">조명 ON/OFF</div></div>
        <div class="status"><div class="label">차이</div><div class="value" id="statusDiff">전원 ON/OFF</div><div class="sub" id="statusDiffSub">프리미엄 · 색온도 가능</div></div>
      </div>
      <div class="devices">
        <div class="device"><div class="left"><div class="ico">💡</div><div>조명</div></div><div class="state"><span class="dot" id="dotLight"></span><span id="txtLight">ON</span></div></div>
        <div class="device"><div class="left"><div class="ico">🖥️</div><div>비디오 월</div></div><div class="state"><span class="dot" id="dotScreen"></span><span id="txtScreen">ON</span></div></div>
        <div class="device"><div class="left"><div class="ico">🪟</div><div>블라인드</div></div><div class="state"><span class="dot" id="dotBlind"></span><span id="txtBlind">OPEN</span></div></div>
        <div class="device"><div class="left"><div class="ico">❄️</div><div>에어컨</div></div><div class="state"><span class="dot" id="dotAc"></span><span id="txtAc">ON</span></div></div>
      </div>
    </aside>
  </div>
</div>

      css:{roomGlow:'rgba(217,246,255,.38)', ceiling:'rgba(217,246,255,.30)', walls:'rgba(217,246,255,.18)', floor:'rgba(217,246,255,.12)', screenColor:'rgba(88,220,255,.44)', blindOpacity:'.82', ambientOpacity:'1', acOpacity:'1', acUnitOpacity:'1', acFlow:'#a9eeff', saturation:'1.08'},

    },
    presentation: {

      css:{roomGlow:'rgba(255,220,150,.22)', ceiling:'rgba(255,220,150,.15)', walls:'rgba(255,220,150,.10)', floor:'rgba(255,220,150,.08)', screenColor:'rgba(90,150,255,.55)', blindOpacity:'.92', ambientOpacity:'.78', acOpacity:'1', acUnitOpacity:'1', acFlow:'#a9eeff', saturation:'1.02'},
      device:{light:true, screen:true, blind:'CLOSE', ac:true}, screenMode:'meeting', blindLeft:'rotate(0)', blindRight:'rotate(0)', blindBadge:'CLOSE'
    },
    focus: {
      title:'집중모드', temp:'6500K', screen:'업무', blind:'반개방', air:'23°C / ON', light:'ON/OFF + 색온도', sub:'6500K · 고조도 · 집중 업무',
      css:{roomGlow:'rgba(217,246,255,.44)', ceiling:'rgba(217,246,255,.36)', walls:'rgba(217,246,255,.22)', floor:'rgba(217,246,255,.14)', screenColor:'rgba(88,220,255,.34)', blindOpacity:'.82', ambientOpacity:'1', acOpacity:'1', acUnitOpacity:'1', acFlow:'#a9eeff', saturation:'1.12'},
      device:{light:true, screen:true, blind:'HALF', ac:true}, screenMode:'meeting', blindLeft:'rotate(4)', blindRight:'rotate(-4)', blindBadge:'HALF'

    rest: {
      title:'휴식모드', temp:'2700K', screen:'OFF', blind:'닫힘', air:'25°C / ON', light:'ON/OFF + 색온도', sub:'2700K · 낮은 밝기 · 대기 분위기',
      css:{roomGlow:'rgba(255,211,122,.18)', ceiling:'rgba(255,211,122,.10)', walls:'rgba(255,211,122,.08)', floor:'rgba(255,211,122,.06)', screenColor:'rgba(32,40,58,.18)', blindOpacity:'.90', ambientOpacity:'.55', acOpacity:'1', acUnitOpacity:'1', acFlow:'#8ee8ff', saturation:'.92'},

};

let currentPackage = 'basic';
let currentScene = 'welcome';

const pkgButtons = [...document.querySelectorAll('.pkg-btn')];
const sceneButtons = [...document.querySelectorAll('.scene-btn')];
const root = document.documentElement;
const q = sel => document.querySelector(sel);
const els = {
  sceneTitle:q('#sceneTitle'), statusTitle:q('#statusTitle'), statusSub:q('#statusSub'), statusDiff:q('#statusDiff'), statusDiffSub:q('#statusDiffSub'),
  kvPackage:q('#kvPackage'), kvLight:q('#kvLight'), kvTemp:q('#kvTemp'), kvScreen:q('#kvScreen'), kvBlind:q('#kvBlind'), kvAir:q('#kvAir'),
  dotLight:q('#dotLight'), dotScreen:q('#dotScreen'), dotBlind:q('#dotBlind'), dotAc:q('#dotAc'), txtLight:q('#txtLight'), txtScreen:q('#txtScreen'), txtBlind:q('#txtBlind'), txtAc:q('#txtAc'),
  blindLeft:q('#blindLeft'), blindRight:q('#blindRight'), blindBadge:q('#blindBadge text'), blindBadgeRect:q('#blindBadgeRect'),
  acBadge:q('#acPowerBadge text'), acBadgeRect:q('#acBadgeRect'), screenBadge:q('#screenBadge text'), screenBadgeRect:q('#screenBadgeRect'),
  videoScreen:q('#videoScreen'), screenLogoShape:q('#screenLogoShape'), screenWave:q('#screenWave')
};

function setDot(el, on){el.classList.toggle('on', !!on)}

function apply(){
  if(!sceneByPackage[currentPackage][currentScene]) currentScene = 'welcome';
  const pkg = packageInfo[currentPackage];
  const s = sceneByPackage[currentPackage][currentScene];
  pkgButtons.forEach(b=>b.classList.toggle('active', b.dataset.package===currentPackage));
  sceneButtons.forEach(b=>{
    b.classList.toggle('hidden', currentPackage === 'basic' && b.classList.contains('premium-only'));
    b.classList.toggle('active', b.dataset.scene===currentScene);
  });

  root.style.setProperty('--room-glow', s.css.roomGlow);
  root.style.setProperty('--ceiling-light', s.css.ceiling);
  root.style.setProperty('--wall-light', s.css.walls);
  root.style.setProperty('--floor-light', s.css.floor);
  root.style.setProperty('--screen-color', s.css.screenColor);
  root.style.setProperty('--blind-opacity', s.css.blindOpacity);
  root.style.setProperty('--ambient-opacity', s.css.ambientOpacity);
  root.style.setProperty('--ac-opacity', s.css.acOpacity);
  root.style.setProperty('--ac-unit-opacity', s.css.acUnitOpacity);
  root.style.setProperty('--ac-flow', s.css.acFlow);
  root.style.setProperty('--room-saturation', s.css.saturation);

  els.sceneTitle.textContent = `${pkg.label} · ${s.title}`;
  els.statusTitle.textContent = `${pkg.label} · ${s.title}`;
  els.statusSub.textContent = s.sub;
  els.statusDiff.textContent = pkg.diff;
  els.statusDiffSub.textContent = pkg.diffSub;

  els.kvPackage.textContent = pkg.label;
  els.kvLight.textContent = s.light;
  els.kvTemp.textContent = s.temp;
  els.kvScreen.textContent = s.screen;
  els.kvBlind.textContent = s.blind;
  els.kvAir.textContent = s.air;

  setDot(els.dotLight, s.device.light); setDot(els.dotScreen, s.device.screen); setDot(els.dotBlind, s.device.blind !== 'CLOSE'); setDot(els.dotAc, s.device.ac);
  els.txtLight.textContent = s.light;
  els.txtScreen.textContent = s.device.screen ? 'ON' : 'OFF';
  els.txtBlind.textContent = s.device.blind;
  els.txtAc.textContent = s.device.ac ? 'ON' : 'OFF';

  els.blindLeft.style.transform = s.blindLeft;
  els.blindRight.style.transform = s.blindRight;
  els.blindBadge.textContent = s.blindBadge;
  els.acBadge.textContent = s.device.ac ? 'ON' : 'OFF';
  els.screenBadgeRect.setAttribute('fill', s.device.screen ? 'rgba(9,16,31,.72)' : 'rgba(65,24,35,.82)');
  els.acBadgeRect.setAttribute('fill', s.device.ac ? 'rgba(9,16,31,.72)' : 'rgba(65,24,35,.82)');
  els.blindBadgeRect.setAttribute('fill', s.device.blind==='CLOSE' ? 'rgba(65,24,35,.82)' : 'rgba(9,16,31,.72)');

  if(s.screenMode==='welcome'){
    els.videoScreen.setAttribute('fill', currentPackage==='premium' ? '#476da8' : '#38577f');
    els.videoScreen.setAttribute('opacity','.98');
    els.screenLogoShape.setAttribute('opacity','1');
    els.screenWave.setAttribute('opacity','0');
    els.screenBadge.textContent='ON';
  } else if(s.screenMode==='meeting'){
    els.videoScreen.setAttribute('fill', currentPackage==='premium' ? '#284b67' : '#344a60');
    els.videoScreen.setAttribute('opacity','.98');
    els.screenLogoShape.setAttribute('opacity','.55');
    els.screenWave.setAttribute('opacity','1');
    els.screenBadge.textContent='MEET';
  } else {
    els.videoScreen.setAttribute('fill','#111827');
    els.videoScreen.setAttribute('opacity','.68');
    els.screenLogoShape.setAttribute('opacity','0');
    els.screenWave.setAttribute('opacity','0');
    els.screenBadge.textContent='OFF';
  }
}

pkgButtons.forEach(btn=>btn.addEventListener('click', ()=>{currentPackage = btn.dataset.package; apply();}));
sceneButtons.forEach(btn=>btn.addEventListener('click', ()=>{currentScene = btn.dataset.scene; apply();}));
apply();
</script>
</body>
</html>
